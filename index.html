<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Caro - Tutor Fluido</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --accent: #ff4b2b; --success: #00ff88; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: rgba(30, 41, 59, 0.95); padding: 35px; border-radius: 40px; width: 95%; max-width: 500px; border: 3px solid var(--primary); box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        .avatar-frame { width: 130px; height: 130px; margin: 0 auto 20px; border-radius: 50%; border: 6px solid #334155; overflow: hidden; background: #1e293b; box-shadow: 0 0 20px var(--primary); transition: 0.3s; }
        .speaking { border-color: var(--success); transform: scale(1.05); box-shadow: 0 0 30px var(--success); }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .btn { border: none; padding: 22px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; margin: 10px 0; color: white; transition: 0.3s; text-transform: uppercase; }
        .btn-junior { background: linear-gradient(45deg, #28a745, #85e085); }
        .btn-tutor { background: linear-gradient(45deg, #3a7bd5, #00d2ff); }
        .btn-mic { background: linear-gradient(45deg, #ff4b2b, #ff416c); font-size: 20px; }
        .panel { background: rgba(0,0,0,0.5); padding: 25px; border-radius: 25px; margin: 20px 0; min-height: 130px; border-left: 6px solid var(--success); display: flex; flex-direction: column; justify-content: center; }
        .txt-en { color: var(--primary); font-size: 28px; font-weight: 900; }
        .txt-es { color: #94a3b8; font-size: 18px; margin-top: 8px; font-style: italic; }
        input { width: 90%; padding: 18px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 25px; font-size: 20px; text-align: center; background: #1e293b; color: white; outline: none; }
        .stat-badge { background: #1e293b; padding: 8px 15px; border-radius: 10px; font-size: 14px; border: 1px solid #334155; }
    </style></head><body><div class="card">
    
    <div id="screen-login">
        <h1 style="color:var(--primary); font-size: 40px; margin-bottom: 10px;">FAMILIA CARO</h1>
        <p style="margin-bottom:20px; font-size: 18px;">Tutoría Conversacional</p>
        <input type="text" id="in-name" placeholder="Tu nombre...">
        <button class="btn btn-junior" onclick="iniciar('junior')">MODO JUNIOR</button>
        <button class="btn btn-tutor" onclick="iniciar('tutor')">MODO TUTOR</button>
    </div>

    <div id="screen-app" style="display:none;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span class="stat-badge">👤 <b id="lbl-user"></b></span>
            <span class="stat-badge" style="color:var(--success)">🏆 PUNTOS: <b id="lbl-points">0</b></span>
        </div>
        <div class="avatar-frame" id="avatar-box"><img src="https://img.freepik.com/foto-gratis/mujer-negocios-sonriente-gafas_23-2148450171.jpg"></div>
        <div class="panel">
            <span class="txt-en" id="main-en">---</span>
            <span class="txt-es" id="main-es">---</span>
        </div>
        <div id="feedback" style="color:var(--gold); font-weight:bold; font-size: 17px; min-height:25px; margin-bottom: 10px;"></div>
        <button class="btn btn-mic" onclick="escuchar()"><i class="fas fa-microphone"></i> TOCAR Y HABLAR</button>
        <button class="btn" style="background:#475569; font-size:11px;" onclick="saltarPaso()">SIGUIENTE PREGUNTA</button>
    </div></div>

<script>
    let state = { user: "", points: 0, mode: "", actual: {}, history: [] };

    const ingredients = {
        actions: ["I want", "I see", "I have", "Give me", "Look at", "Where is", "I like", "I need", "Bring me", "I love", "This is", "Open", "Close", "Eat", "Clean", "Find"],
        actionsEs: ["Quiero", "Veo", "Tengo", "Dame", "Mira", "¿Dónde está", "Me gusta", "Necesito", "Trae", "Amo", "Este es", "Abre", "Cierra", "Come", "Limpia", "Busca"],
        objects: ["backpack", "shoes", "shirt", "milk", "bread", "apple", "door", "window", "water", "cat", "dog", "pencil", "book", "sun", "moon", "car", "ball", "spoon", "plate", "bed", "table", "chair", "key", "phone", "mirror", "soap", "towel", "banana", "orange", "cookie", "chicken", "egg", "flower", "tree", "bird", "toy", "garden", "kitchen", "bathroom", "bedroom", "fridge", "fork", "knife", "cup", "juice", "pizza", "rice", "hat", "socks", "jacket", "umbrella", "bike", "school", "notebook", "computer", "glasses", "clock", "lamp", "sofa", "television", "pillow", "blanket", "brush"],
        objectsEs: ["morral", "zapatos", "camisa", "leche", "pan", "manzana", "puerta", "ventana", "agua", "gato", "perro", "lápiz", "libro", "sol", "luna", "carro", "pelota", "cuchara", "plato", "cama", "mesa", "silla", "llave", "teléfono", "espejo", "jabón", "toalla", "banano", "naranja", "galleta", "pollo", "huevo", "flor", "árbol", "pájaro", "juguete", "jardín", "cocina", "baño", "cuarto", "nevera", "tenedor", "cuchillo", "pocillo", "jugo", "pizza", "arroz", "sombrero", "medias", "chaqueta", "sombrilla", "bici", "escuela", "cuaderno", "computador", "gafas", "reloj", "lámpara", "sofá", "televisión", "almohada", "cobija", "cepillo"]
    };

    function hablar(texto, lang, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = lang; 
        msg.rate = 0.85;
        document.getElementById('avatar-box').classList.add('speaking');
        msg.onend = () => { 
            document.getElementById('avatar-box').classList.remove('speaking');
            if(callback) callback(); 
        };
        window.speechSynthesis.speak(msg);
    }

    function iniciar(m) {
        state.user = document.getElementById('in-name').value || "Familia Caro";
        state.mode = m;
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-app').style.display = 'block';
        document.getElementById('lbl-user').innerText = state.user.toUpperCase();
        
        hablar(`¡Hola ${state.user}! Soy tu tutor. Vamos a conversar un poco.`, "es-ES", saltarPaso);
    }

    function saltarPaso() {
        let en, es, randomIdx;
        document.getElementById('feedback').innerText = "";
        
        do {
            randomIdx = Math.floor(Math.random() * ingredients.objects.length);
        } while (state.history.includes(randomIdx) && state.history.length < 40);

        state.history.push(randomIdx);
        if(state.history.length > 50) state.history.shift();

        if (state.mode === 'junior') {
            en = ingredients.objects[randomIdx];
            es = ingredients.objectsEs[randomIdx];
        } else {
            let actIdx = Math.floor(Math.random() * ingredients.actions.length);
            en = `${ingredients.actions[actIdx]} the ${ingredients.objects[randomIdx]}`;
            es = `${ingredients.actionsEs[actIdx]} el/la ${ingredients.objectsEs[randomIdx]}`;
        }

        state.actual = { en, es, target: en.toLowerCase() };
        document.getElementById('main-en').innerText = en.toUpperCase();
        document.getElementById('main-es').innerText = "(" + es + ")";

        // INTERACCIÓN MÁS HUMANA: El tutor introduce la palabra
        const intro = state.mode === 'junior' ? `¿Cómo dirías ${es}?` : `Ahora intenta decir: ${es}`;
        hablar(intro, "es-ES", () => {
            setTimeout(() => hablar(en, "en-US"), 500);
        });
    }

    function escuchar() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();
        rec.lang = 'en-US';
        rec.onstart = () => document.getElementById('feedback').innerText = "Te escucho...";
        
        rec.onresult = (e) => {
            const voz = e.results[0][0].transcript.toLowerCase();
            const esCorrecto = voz.includes(state.actual.target) || voz.includes(ingredients.objects[state.history[state.history.length-1]]);

            if(esCorrecto) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                state.points += 50;
                document.getElementById('lbl-points').innerText = state.points;
                document.getElementById('feedback').innerText = "¡EXCELENTE!";
                
                // Feedback conversacional
                hablar(`¡Increíble ${state.user}! Lo dijiste perfecto. ¡Puntos para la Familia Caro!`, "es-ES", () => {
                    setTimeout(saltarPaso, 1500);
                });
            } else {
                document.getElementById('feedback').innerText = `Dijiste: ${voz}`;
                // CORRECCIÓN FLUIDA
                hablar(`Escuché algo como ${voz}, pero para decir ${state.actual.es} usamos ${state.actual.en}. Inténtalo de nuevo, tú puedes.`, "es-ES");
            }
        };
        rec.start();
    }
</script></body></html>
