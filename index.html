<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Caro - Native Academy</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --accent: #ff4b2b; --success: #00ff88; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 30px; width: 90%; max-width: 450px; border: 2px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .evolution-bar { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #evolution-fill { width: 0%; height: 100%; background: var(--success); transition: 0.5s; }
        .stats-top { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8; margin-bottom: 5px; }
        .avatar-frame { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 6px solid #334155; overflow: hidden; transition: 0.3s; background: #1e293b; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { border-color: var(--success); box-shadow: 0 0 30px var(--success); transform: scale(1.05); }
        .listening { border-color: var(--accent); box-shadow: 0 0 30px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn { border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin: 8px 0; color: white; transition: 0.2s; }
        .btn-junior { background: #28a745; }
        .btn-tutor { background: #3a7bd5; }
        .btn-mic { background: var(--accent); font-size: 18px; box-shadow: 0 4px 15px rgba(255,75,43,0.3); }
        .panel { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; margin: 15px 0; min-height: 110px; display: flex; flex-direction: column; justify-content: center; border-left: 4px solid var(--primary); }
        .txt-en { color: var(--primary); font-size: 22px; font-weight: bold; margin: 0; line-height: 1.2; }
        .txt-es { color: #94a3b8; font-style: italic; font-size: 14px; margin-top: 5px; }
        input { width: 80%; padding: 15px; border-radius: 12px; border: none; margin-bottom: 20px; font-size: 16px; text-align: center; background: #1e293b; color: white; border: 1px solid #334155; }
    </style></head><body><div class="card">
    <div id="screen-login">
        <h1 style="color:var(--primary); margin-bottom:5px;">Familia Caro</h1>
        <p style="margin-top:0; opacity:0.8;">Inglés Nativo e Infinito</p>
        <input type="text" id="in-name" placeholder="Tu nombre...">
        <button class="btn btn-junior" onclick="iniciar('junior')">MODO JUNIOR (Objetos)</button>
        <button class="btn btn-tutor" onclick="iniciar('tutor')">MODO NATIVO (Hablar)</button>
    </div>

    <div id="screen-app" style="display:none;">
        <div class="stats-top">
            <span><i class="fas fa-stopwatch"></i> <span id="timer">15:00</span></span>
            <span>NIVEL <b id="lbl-level" style="color:var(--gold)">1</b></span>
        </div>
        <div class="evolution-bar"><div id="evolution-fill"></div></div>
        <div class="avatar-frame" id="avatar-box"><img src="https://img.freepik.com/foto-gratis/mujer-negocios-sonriente-gafas_23-2148450171.jpg"></div>
        <div id="info-header" style="font-size: 11px; margin-bottom: 10px; opacity: 0.6; display:flex; justify-content:space-between;">
            <span id="lbl-user"></span>
            <span>Puntos Caro: <b id="lbl-points" style="color:var(--success)">0</b></span>
        </div>
        <div class="panel">
            <span class="txt-en" id="main-en">---</span>
            <span class="txt-es" id="main-es">---</span>
        </div>
        <p id="instruction" style="color: #00ff88; font-size: 14px; font-weight: bold; height: 20px;"></p>
        <button class="btn btn-mic" id="mic-btn" onclick="escuchar()"><i class="fas fa-microphone"></i> TOCAR PARA HABLAR</button>
        <button class="btn" style="background:#334155; font-size:11px; padding:10px;" onclick="saltarPaso()">SIGUIENTE FRASE</button>
    </div></div>

<script>
    let state = { user: "", points: 0, mode: "", level: 1, timeLeft: 900, actual: {}, pool: [] };

    // COMPONENTES PARA GENERAR LENGUAJE INFINITO
    const ingredients = {
        actions: ["I want", "I see", "I have", "Give me", "Look at the", "Where is the"],
        actionsEs: ["Yo quiero", "Yo veo", "Yo tengo", "Dame", "Mira el", "¿Dónde está el"],
        objects: ["water", "apple", "door", "window", "backpack", "shoes", "shirt", "milk", "bread", "cat", "dog", "pencil", "book", "sun", "moon", "car", "ball", "spoon", "plate", "bed"],
        objectsEs: ["agua", "manzana", "puerta", "ventana", "morral", "zapatos", "camisa", "leche", "pan", "gato", "perro", "lápiz", "libro", "sol", "luna", "carro", "pelota", "cuchara", "plato", "cama"],
        social: [
            {en:"Good morning", es:"Buenos días"}, {en:"I love you", es:"Te quiero"}, {en:"Help me please", es:"Ayúdame por favor"},
            {en:"I am happy", es:"Estoy feliz"}, {en:"Let's play", es:"Vamos a jugar"}, {en:"Check this out", es:"Mira esto"}
        ]
    };

    function hablar(en, es, expli, callback) {
        window.speechSynthesis.cancel();
        const msgEn = new SpeechSynthesisUtterance(en);
        msgEn.lang = 'en-US'; msgEn.rate = 0.8;
        const msgEs = new SpeechSynthesisUtterance(expli);
        msgEs.lang = 'es-ES'; msgEs.rate = 0.95;
        document.getElementById('avatar-box').classList.add('speaking');
        msgEs.onend = () => { if(en) window.speechSynthesis.speak(msgEn); else if(callback) callback(); };
        msgEn.onend = () => { document.getElementById('avatar-box').classList.remove('speaking'); if(callback) callback(); };
        window.speechSynthesis.speak(msgEs);
    }

    function iniciar(m) {
        state.user = document.getElementById('in-name').value || "Familia Caro";
        state.mode = m;
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-app').style.display = 'block';
        document.getElementById('lbl-user').innerText = "👤 " + state.user;
        
        setInterval(() => { if(state.timeLeft > 0) state.timeLeft--; }, 1000);
        hablar("", "", `¡Hola! Iniciando modo nativo para la Familia Caro.`, saltarPaso);
    }

    function saltarPaso() {
        let en, es;
        
        if (state.mode === 'junior') {
            // Modo Objetos Puros
            const idx = Math.floor(Math.random() * ingredients.objects.length);
            en = ingredients.objects[idx];
            es = ingredients.objectsEs[idx];
        } else {
            // MODO NATIVO: Genera combinaciones aleatorias gramaticales
            if (Math.random() > 0.4) {
                const aIdx = Math.floor(Math.random() * ingredients.actions.length);
                const oIdx = Math.floor(Math.random() * ingredients.objects.length);
                en = `${ingredients.actions[aIdx]} ${ingredients.objects[oIdx]}`;
                es = `${ingredients.actionsEs[aIdx]} ${ingredients.objectsEs[oIdx]}`;
            } else {
                const sIdx = Math.floor(Math.random() * ingredients.social.length);
                en = ingredients.social[sIdx].en;
                es = ingredients.social[sIdx].es;
            }
        }
        
        state.actual = { en, es, target: en.toLowerCase() };
        document.getElementById('main-en').innerText = en;
        document.getElementById('main-es').innerText = "(" + es + ")";
        document.getElementById('instruction').innerText = "TE ESCUCHO...";

        hablar(en, "", `En inglés se dice: ${en}.`);
    }

    function escuchar() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Recognition) return alert("Tu navegador no soporta voz.");
        const rec = new Recognition();
        rec.lang = 'en-US';
        rec.onstart = () => document.getElementById('avatar-box').classList.add('listening');
        rec.onresult = (e) => {
            const voz = e.results[0][0].transcript.toLowerCase();
            document.getElementById('avatar-box').classList.remove('listening');
            
            // Verificación inteligente: si la frase es larga, buscamos las palabras clave
            const palabrasTarget = state.actual.target.split(' ');
            const clave = palabrasTarget[palabrasTarget.length - 1];

            if(voz.includes(clave) || voz.includes(state.actual.target)) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                state.points += 20;
                document.getElementById('lbl-points').innerText = state.points;
                document.getElementById('evolution-fill').style.width = (state.points % 100) + "%";
                if(state.points % 100 === 0) { state.level++; document.getElementById('lbl-level').innerText = state.level; }
                
                document.getElementById('instruction').innerText = "¡NATIVO!";
                hablar("", "", "¡Muy bien! ¡Puntos para la Familia Caro!", () => {
                    setTimeout(saltarPaso, 1500);
                });
            } else {
                document.getElementById('instruction').innerText = "CASI... OTRA VEZ";
                hablar("", "", `Escuché ${voz}. Inténtalo de nuevo:`, () => {
                    setTimeout(() => hablar(state.actual.en, "", ""), 500);
                });
            }
        };
        rec.start();
    }
</script></body></html>
