<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Caro Academy - Infinito</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --accent: #ff4b2b; --success: #00ff88; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 30px; width: 90%; max-width: 450px; border: 2px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .evolution-bar { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #evolution-fill { width: 0%; height: 100%; background: var(--success); transition: 0.5s; }
        .stats-top { display: flex; justify-content: space-between; font-size: 11px; opacity: 0.8; margin-bottom: 5px; }
        .avatar-frame { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 50%; border: 6px solid #334155; overflow: hidden; transition: 0.3s; background: #1e293b; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { border-color: var(--success); box-shadow: 0 0 30px var(--success); transform: scale(1.05); }
        .listening { border-color: var(--accent); box-shadow: 0 0 30px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn { border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin: 8px 0; color: white; transition: 0.2s; }
        .btn-junior { background: #28a745; }
        .btn-tutor { background: #3a7bd5; }
        .btn-mic { background: var(--accent); font-size: 18px; box-shadow: 0 4px 15px rgba(255,75,43,0.3); }
        .panel { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; margin: 15px 0; min-height: 110px; display: flex; flex-direction: column; justify-content: center; border-left: 4px solid var(--primary); }
        .txt-en { color: var(--primary); font-size: 24px; font-weight: bold; margin: 0; }
        .txt-es { color: #94a3b8; font-style: italic; font-size: 15px; margin-top: 5px; }
        .txt-pron { color: #facc15; font-size: 14px; margin-top: 8px; font-weight: bold; background: rgba(250, 204, 21, 0.1); padding: 5px; border-radius: 5px; }
        input { width: 80%; padding: 15px; border-radius: 12px; border: none; margin-bottom: 20px; font-size: 16px; text-align: center; background: #1e293b; color: white; border: 1px solid #334155; }
    </style></head><body><div class="card">
    <div id="screen-login">
        <h1 style="color:var(--primary); margin-bottom:5px;">Familia Caro</h1>
        <p style="margin-top:0; opacity:0.8;">Inglés para el mundo real</p>
        <input type="text" id="in-name" placeholder="Escribe tu nombre...">
        <button class="btn btn-junior" onclick="iniciar('junior')">MODO JUNIOR</button>
        <button class="btn btn-tutor" onclick="iniciar('tutor')">MODO TUTOR</button>
    </div>

    <div id="screen-app" style="display:none;">
        <div class="stats-top">
            <span><i class="fas fa-stopwatch"></i> <span id="timer">10:00</span></span>
            <span>NIVEL <b id="lbl-level" style="color:var(--gold)">1</b></span>
        </div>
        <div class="evolution-bar"><div id="evolution-fill"></div></div>
        <div class="avatar-frame" id="avatar-box"><img src="https://img.freepik.com/foto-gratis/mujer-negocios-sonriente-gafas_23-2148450171.jpg"></div>
        <div id="info-header" style="font-size: 12px; margin-bottom: 10px; opacity: 0.6; display:flex; justify-content:space-between;">
            <span id="lbl-user"></span>
            <span>Puntos: <b id="lbl-points" style="color:var(--success)">0</b></span>
        </div>
        <div class="panel">
            <span class="txt-en" id="main-en">---</span>
            <span class="txt-es" id="main-es">---</span>
            <span class="txt-pron" id="main-pron">---</span>
        </div>
        <p id="instruction" style="color: #00ff88; font-size: 14px; font-weight: bold; height: 20px;"></p>
        <button class="btn btn-mic" id="mic-btn" onclick="escuchar()"><i class="fas fa-microphone"></i> TOCAR PARA HABLAR</button>
        <button class="btn" style="background:#334155; font-size:11px; padding:10px;" onclick="saltarPaso()">SALTAR / SIGUIENTE</button>
    </div></div>

<script>
    let state = { user: "", points: 0, mode: "", level: 1, timeLeft: 600, actual: {}, index: 0 };

    // BANCO DE DATOS MASIVO - OBJETOS Y PREGUNTAS COTIDIANAS
    const db = {
        junior: [
            // Objetos de casa
            {en:"Television", es:"Televisión"}, {en:"Refrigerator", es:"Nevera"}, {en:"Mirror", es:"Espejo"}, {en:"Soap", es:"Jabón"},
            {en:"Toothbrush", es:"Cepillo de dientes"}, {en:"Spoon", es:"Cuchara"}, {en:"Blanket", es:"Manta"}, {en:"Window", es:"Ventana"},
            // Animales y Naturaleza
            {en:"Elephant", es:"Elefante"}, {en:"Butterfly", es:"Mariposa"}, {en:"Rabbit", es:"Conejo"}, {en:"Rainbow", es:"Arcoíris"},
            {en:"Cloud", es:"Nube"}, {en:"Ocean", es:"Océano"}, {en:"Forest", es:"Bosque"}, {en:"Mountain", es:"Montaña"},
            // Ropa y Cuerpo
            {en:"Glasses", es:"Gafas"}, {en:"Shirt", es:"Camisa"}, {en:"Pants", es:"Pantalones"}, {en:"Finger", es:"Dedo"},
            {en:"Shoulders", es:"Hombros"}, {en:"Elbow", es:"Codo"}, {en:"Sneakers", es:"Tenis"}, {en:"Gloves", es:"Guantes"},
            // Comida
            {en:"Strawberry", es:"Fresa"}, {en:"Cheese", es:"Queso"}, {en:"Chicken", es:"Pollo"}, {en:"Juice", es:"Jugo"},
            {en:"Banana", es:"Banano"}, {en:"Carrot", es:"Zanahoria"}, {en:"Ice cream", es:"Helado"}, {en:"Watermelon", es:"Sandía"}
        ],
        tutor: [
            // Preguntas diarias
            {en:"Where are my keys?", es:"¿Dónde están mis llaves?"}, {en:"Turn off the lights", es:"Apaga las luces"},
            {en:"Pass me the remote", es:"Pásame el control remoto"}, {en:"Dinner is ready", es:"La cena está lista"},
            {en:"I am going to sleep", es:"Me voy a dormir"}, {en:"Wake up sweetie", es:"Despierta cariño"},
            {en:"Did you wash your hands?", es:"¿Te lavaste las manos?"}, {en:"I love this movie", es:"Me encanta esta película"},
            // Interacción social
            {en:"How was your day?", es:"¿Cómo estuvo tu día?"}, {en:"I am very proud of you", es:"Estoy muy orgulloso de ti"},
            {en:"Don't worry about it", es:"No te preocupes por eso"}, {en:"Can you repeat that?", es:"¿Puedes repetir eso?"},
            {en:"Let's go to the park", es:"Vamos al parque"}, {en:"Give me a hug", es:"Dame un abrazo"},
            // Necesidades y Trabajo
            {en:"I have a lot of work", es:"Tengo mucho trabajo"}, {en:"The internet is slow", es:"El internet está lento"},
            {en:"Charge my phone please", es:"Carga mi celular por favor"}, {en:"I need an umbrella", es:"Necesito una sombrilla"},
            {en:"It is raining outside", es:"Está lloviendo afuera"}, {en:"I am thirsty", es:"Tengo sed"}
        ]
    };

    function hablar(en, es, expli, callback) {
        window.speechSynthesis.cancel();
        const msgEn = new SpeechSynthesisUtterance(en);
        msgEn.lang = 'en-US'; msgEn.rate = 0.75; 
        const msgEs = new SpeechSynthesisUtterance(expli);
        msgEs.lang = 'es-ES'; msgEs.rate = 0.9;
        document.getElementById('avatar-box').classList.add('speaking');
        msgEs.onend = () => { if(en) window.speechSynthesis.speak(msgEn); else if(callback) callback(); };
        msgEn.onend = () => { document.getElementById('avatar-box').classList.remove('speaking'); if(callback) callback(); };
        window.speechSynthesis.speak(msgEs);
    }

    function iniciar(m) {
        state.user = document.getElementById('in-name').value;
        if(!state.user) return alert("Escribe tu nombre");
        state.mode = m;
        // Mezcla la lista para que el orden sea infinito
        db[m].sort(() => Math.random() - 0.5);
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-app').style.display = 'block';
        document.getElementById('lbl-user').innerText = "👤 " + state.user;
        
        setInterval(() => {
            if(state.timeLeft > 0) {
                state.timeLeft--;
                let mins = Math.floor(state.timeLeft / 60);
                let secs = state.timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }
        }, 1000);

        hablar("", "", `¡Hola ${state.user}! Vamos a aprender cosas de la casa y la vida real.`, saltarPaso);
    }

    function saltarPaso() {
        const lista = db[state.mode];
        const elegido = lista[state.index % lista.length];
        state.index++; // Avanza cíclicamente pero en orden mezclado
        
        state.actual = { en: elegido.en, es: elegido.es, target: elegido.en.toLowerCase() };

        document.getElementById('main-en').innerText = state.actual.en;
        document.getElementById('main-es').innerText = "(" + state.actual.es + ")";
        document.getElementById('main-pron').innerText = "Voz activa";
        document.getElementById('instruction').innerText = "TE ESCUCHO...";

        const texto = (state.mode === 'junior')
            ? `Dí ${state.actual.en}. Que es ${state.actual.es}.`
            : `En el día a día decimos: ${state.actual.es}. En inglés es: ${state.actual.en}. Repítelo:`;
        
        hablar(state.actual.en, "", texto);
    }

    function escuchar() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();
        rec.lang = 'en-US';
        rec.onstart = () => {
            document.getElementById('avatar-box').classList.add('listening');
        };
        rec.onresult = (e) => {
            const voz = e.results[0][0].transcript.toLowerCase();
            document.getElementById('avatar-box').classList.remove('listening');
            
            // Compara la última palabra para facilitar el acierto en frases largas
            const palabrasTarget = state.actual.target.split(' ');
            const ultimaPalabra = palabrasTarget[palabrasTarget.length - 1];

            if(voz.includes(ultimaPalabra) || voz.includes(state.actual.target)) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                state.points += 10;
                document.getElementById('lbl-points').innerText = state.points;
                document.getElementById('evolution-fill').style.width = (state.points % 100) + "%";
                if(state.points % 100 === 0) { state.level++; document.getElementById('lbl-level').innerText = state.level; }

                document.getElementById('instruction').innerText = "¡EXCELENTE!";
                hablar("", "", "¡Muy bien! ¡Puntos para ti!", () => {
                    setTimeout(saltarPaso, 1500);
                });
            } else {
                document.getElementById('instruction').innerText = "INTENTA OTRA VEZ";
                hablar("", "", `Casi, escuché ${voz}. Intenta de nuevo:`, () => {
                    setTimeout(() => hablar(state.actual.en, "", ""), 500);
                });
            }
        };
        rec.start();
    }
</script></body></html>
