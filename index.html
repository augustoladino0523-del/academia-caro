<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Caro - IA Conversacional</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --accent: #ff4b2b; --success: #00ff88; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 30px; width: 90%; max-width: 450px; border: 2px solid var(--primary); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .evolution-bar { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #evolution-fill { width: 0%; height: 100%; background: var(--success); transition: 0.5s; }
        .avatar-frame { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; border: 6px solid #334155; overflow: hidden; transition: 0.3s; background: #1e293b; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .speaking { border-color: var(--success); box-shadow: 0 0 30px var(--success); transform: scale(1.05); }
        .listening { border-color: var(--accent); box-shadow: 0 0 30px var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn { border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin: 8px 0; color: white; transition: 0.2s; }
        .btn-mic { background: var(--accent); font-size: 18px; }
        .panel { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; margin: 15px 0; min-height: 110px; border-left: 4px solid var(--primary); }
        .txt-en { color: var(--primary); font-size: 24px; font-weight: bold; display: block; }
        .txt-es { color: #94a3b8; font-size: 14px; display: block; margin-top: 5px; }
        .feedback { font-size: 13px; color: var(--gold); margin-top: 10px; font-weight: bold; min-height: 20px; }
    </style></head><body><div class="card">
    <div id="screen-login">
        <h1 style="color:var(--primary);">Familia Caro</h1>
        <p>Conversación Real & Corrección</p>
        <button class="btn" style="background:#28a745" onclick="iniciar('junior')">MODO JUNIOR</button>
        <button class="btn" style="background:#3a7bd5" onclick="iniciar('tutor')">MODO TUTOR (Conversar)</button>
    </div>

    <div id="screen-app" style="display:none;">
        <div class="evolution-bar"><div id="evolution-fill"></div></div>
        <div class="avatar-frame" id="avatar-box"><img src="https://img.freepik.com/foto-gratis/mujer-negocios-sonriente-gafas_23-2148450171.jpg"></div>
        <div class="panel">
            <span class="txt-en" id="main-en">---</span>
            <span class="txt-es" id="main-es">---</span>
        </div>
        <div id="feedback-msg" class="feedback"></div>
        <button class="btn btn-mic" onclick="escuchar()"><i class="fas fa-microphone"></i> TOCAR Y HABLAR</button>
        <button class="btn" style="background:#334155; font-size:11px;" onclick="saltarPaso()">OTRA FRASE</button>
    </div></div>

<script>
    let state = { points: 0, mode: "", actual: {} };

    // TANQUE MASIVO DE INGREDIENTES (1.000+ Combinaciones posibles)
    const ingredients = {
        actions: ["I want", "I see", "I have", "Give me", "Look at the", "Where is the", "I like the", "I need a", "She wants", "He sees", "My mom has", "Please open the", "Close the", "Clean the", "Bring me", "I am eating", "I am drinking", "Do you like", "I can see", "Let's go to"],
        actionsEs: ["Yo quiero", "Yo veo", "Yo tengo", "Dame", "Mira el", "¿Dónde está el", "Me gusta el", "Necesito un", "Ella quiere", "Él ve", "Mi mamá tiene", "Por favor abre la", "Cierra la", "Limpia la", "Tráeme", "Estoy comiendo", "Estoy bebiendo", "¿Te gusta?", "Puedo ver", "Vamos a"],
        objects: ["water", "apple", "door", "window", "backpack", "shoes", "shirt", "milk", "bread", "cat", "dog", "pencil", "book", "sun", "moon", "car", "ball", "spoon", "plate", "bed", "table", "chair", "key", "phone", "mirror", "soap", "towel", "banana", "orange", "cookie", "chicken", "egg", "flower", "tree", "bird", "toy", "garden", "kitchen", "bathroom", "bedroom", "fridge", "fork", "knife", "cup", "juice", "pizza", "rice", "hat", "socks", "jacket"],
        objectsEs: ["agua", "manzana", "puerta", "ventana", "morral", "zapatos", "camisa", "leche", "pan", "gato", "perro", "lápiz", "libro", "sol", "luna", "carro", "pelota", "cuchara", "plato", "cama", "mesa", "silla", "llave", "teléfono", "espejo", "jabón", "toalla", "banano", "naranja", "galleta", "pollo", "huevo", "flor", "árbol", "pájaro", "juguete", "jardín", "cocina", "baño", "cuarto", "nevera", "tenedor", "cuchillo", "pocillo", "jugo", "pizza", "arroz", "sombrero", "medias", "chaqueta"],
        social: [
            {en:"How are you today?", es:"¿Cómo estás hoy?"}, {en:"I am very happy", es:"Estoy muy feliz"}, {en:"I love my family", es:"Amo a mi familia"},
            {en:"Can you help me?", es:"¿Puedes ayudarme?"}, {en:"What is your name?", es:"¿Cómo te llamas?"}, {en:"I am hungry", es:"Tengo hambre"},
            {en:"I want to sleep", es:"Quiero dormir"}, {en:"Let's go play", es:"Vamos a jugar"}, {en:"It is a beautiful day", es:"Es un día hermoso"},
            {en:"Where are my shoes?", es:"¿Donde están mis zapatos?"}, {en:"I like English", es:"Me gusta el inglés"}, {en:"Good job", es:"Buen trabajo"}
        ]
    };

    function hablar(texto, lang, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = lang; msg.rate = 0.85;
        document.getElementById('avatar-box').classList.add('speaking');
        msg.onend = () => { document.getElementById('avatar-box').classList.remove('speaking'); if(callback) callback(); };
        window.speechSynthesis.speak(msg);
    }

    function iniciar(m) {
        state.mode = m;
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-app').style.display = 'block';
        hablar("¡Hola Familia Caro! Vamos a conversar.", "es-ES", saltarPaso);
    }

    function saltarPaso() {
        let en, es;
        document.getElementById('feedback-msg').innerText = "";
        
        if (state.mode === 'junior') {
            const idx = Math.floor(Math.random() * ingredients.objects.length);
            en = ingredients.objects[idx]; es = ingredients.objectsEs[idx];
        } else {
            if (Math.random() > 0.4) {
                const aIdx = Math.floor(Math.random() * ingredients.actions.length);
                const oIdx = Math.floor(Math.random() * ingredients.objects.length);
                en = `${ingredients.actions[aIdx]} ${ingredients.objects[oIdx]}`;
                es = `${ingredients.actionsEs[aIdx]} ${ingredients.objectsEs[oIdx]}`;
            } else {
                const sIdx = Math.floor(Math.random() * ingredients.social.length);
                en = ingredients.social[sIdx].en; es = ingredients.social[sIdx].es;
            }
        }
        state.actual = { en, es, target: en.toLowerCase() };
        document.getElementById('main-en').innerText = en;
        document.getElementById('main-es').innerText = "(" + es + ")";
        hablar(en, "en-US");
    }

    function escuchar() {
        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = new Recognition();
        rec.lang = 'en-US';
        rec.onstart = () => { 
            document.getElementById('avatar-box').classList.add('listening');
            document.getElementById('feedback-msg').innerText = "Te estoy escuchando...";
        };
        rec.onresult = (e) => {
            document.getElementById('avatar-box').classList.remove('listening');
            const voz = e.results[0][0].transcript.toLowerCase();
            
            if(voz.includes(state.actual.target)) {
                confetti({ particleCount: 150 });
                document.getElementById('feedback-msg').innerText = "¡PERFECTO!";
                hablar("¡Muy bien! ¡Puntos para la Familia Caro!", "es-ES", () => setTimeout(saltarPaso, 1000));
            } else {
                // LÓGICA DE CORRECCIÓN
                document.getElementById('feedback-msg').innerText = `Dijiste: "${voz}"`;
                hablar(`Te escuché decir ${voz}, pero se dice ${state.actual.en}. Inténtalo de nuevo.`, "es-ES", () => {
                    setTimeout(() => hablar(state.actual.en, "en-US"), 500);
                });
            }
        };
        rec.start();
    }
</script></body></html>
