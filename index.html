<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familia Caro - Academia Pro v12</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.98); --success: #00ff88; --gold: #facc15; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 40px; width: 95%; max-width: 500px; border: 4px solid var(--primary); box-shadow: 0 20px 60px rgba(0,0,0,0.8); text-align: center; }
        .avatar-frame { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; border: 6px solid #334155; overflow: hidden; background: #1e293b; box-shadow: 0 0 20px var(--primary); transition: 0.3s; }
        .speaking { border-color: var(--success); transform: scale(1.05); box-shadow: 0 0 30px var(--success); }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .btn { border: none; padding: 18px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin: 10px 0; color: white; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-junior { background: linear-gradient(45deg, #28a745, #85e085); }
        .btn-tutor { background: linear-gradient(45deg, #3a7bd5, #00d2ff); }
        .btn-pro { background: linear-gradient(45deg, #6a11cb, #2575fc); border: 2px solid white; }
        .btn-mic { background: linear-gradient(45deg, #ff4b2b, #ff416c); font-size: 20px; height: 70px; }
        .panel { background: rgba(0,0,0,0.6); padding: 25px; border-radius: 25px; margin: 20px 0; min-height: 130px; border-left: 6px solid var(--success); }
        .txt-en { color: var(--primary); font-size: 26px; font-weight: 900; display: block; }
        .txt-es { color: #94a3b8; font-size: 17px; margin-top: 8px; font-style: italic; display: block; }
        input { width: 85%; padding: 18px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 25px; font-size: 18px; text-align: center; background: #1e293b; color: white; outline: none; }
        .stat-badge { background: #1e293b; padding: 8px 15px; border-radius: 10px; font-size: 13px; border: 1px solid #334155; }
    </style></head><body>

<div class="card">
    <div id="screen-login">
        <h1 style="color:var(--primary); font-size: 35px; margin-bottom: 5px;">FAMILIA CARO</h1>
        <p style="margin-bottom:25px; font-size: 16px; color: #94a3b8;">Academia Profesional de Inglés</p>
        <input type="text" id="in-name" placeholder="Tu nombre aquí...">
        <button class="btn btn-junior" onclick="iniciar('junior')"><i class="fas fa-star"></i> MODO NIÑOS</button>
        <button class="btn btn-tutor" onclick="iniciar('tutor')"><i class="fas fa-graduation-cap"></i> MODO TUTOR (ACCIONES)</button>
        <button class="btn btn-pro" onclick="iniciar('pro')"><i class="fas fa-comments"></i> CONVERSACIÓN REAL</button>
    </div>

    <div id="screen-app" style="display:none;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <span class="stat-badge">USUARIO: <b id="lbl-user"></b></span>
            <span class="stat-badge" style="color:var(--success)">PUNTOS: <b id="lbl-points">0</b></span>
        </div>
        <div class="avatar-frame" id="avatar-box"><img src="https://img.freepik.com/foto-gratis/mujer-negocios-sonriente-gafas_23-2148450171.jpg"></div>
        <div class="panel">
            <span class="txt-en" id="main-en">---</span>
            <span class="txt-es" id="main-es">---</span>
        </div>
        <div id="feedback" style="color:var(--gold); font-weight:bold; font-size: 14px; margin-bottom: 15px; min-height: 20px;"></div>
        <button class="btn btn-mic" id="btn-mic" onclick="escuchar()"><i class="fas fa-microphone"></i> TOCAR Y HABLAR</button>
        <button class="btn" style="background:#475569; font-size:11px; height: 40px;" onclick="saltarPaso()">SIGUIENTE PREGUNTA</button>
    </div>
</div>

<script>
    let state = { user: "", points: 0, mode: "", actual: {}, history: [] };

    const db = {
        // LISTA EXPANDIDA A 70 OBJETOS
        objects: [
            {en: "backpack", es: "morral", g: "m"}, {en: "shoes", es: "zapatos", g: "m"}, {en: "shirt", es: "camisa", g: "f"},
            {en: "milk", es: "leche", g: "f"}, {en: "bread", es: "pan", g: "m"}, {en: "apple", es: "manzana", g: "f"},
            {en: "door", es: "puerta", g: "f"}, {en: "window", es: "ventana", g: "f"}, {en: "water", es: "agua", g: "f"},
            {en: "cat", es: "gato", g: "m"}, {en: "dog", es: "perro", g: "m"}, {en: "pencil", es: "lápiz", g: "m"},
            {en: "book", es: "libro", g: "m"}, {en: "car", es: "carro", g: "m"}, {en: "ball", es: "pelota", g: "f"},
            {en: "spoon", es: "cuchara", g: "f"}, {en: "plate", es: "plato", g: "m"}, {en: "bed", es: "cama", g: "f"},
            {en: "table", es: "mesa", g: "f"}, {en: "chair", es: "silla", g: "f"}, {en: "key", es: "llave", g: "f"},
            {en: "phone", es: "teléfono", g: "m"}, {en: "soap", es: "jabón", g: "m"}, {en: "towel", es: "toalla", g: "f"},
            {en: "banana", es: "banano", g: "m"}, {en: "orange", es: "naranja", g: "f"}, {en: "cookie", es: "galleta", g: "f"},
            {en: "chicken", es: "pollo", g: "m"}, {en: "egg", es: "huevo", g: "m"}, {en: "flower", es: "flor", g: "f"},
            {en: "tree", es: "árbol", g: "m"}, {en: "toy", es: "juguete", g: "m"}, {en: "garden", es: "jardín", g: "m"},
            {en: "kitchen", es: "cocina", g: "f"}, {en: "bathroom", es: "baño", g: "m"}, {en: "fridge", es: "nevera", g: "f"},
            {en: "fork", es: "tenedor", g: "m"}, {en: "cup", es: "pocillo", g: "m"}, {en: "juice", es: "jugo", g: "m"},
            {en: "pizza", es: "pizza", g: "f"}, {en: "rice", es: "arroz", g: "m"}, {en: "hat", es: "sombrero", g: "m"},
            {en: "socks", es: "medias", g: "f"}, {en: "jacket", es: "chaqueta", g: "f"}, {en: "umbrella", es: "sombrilla", g: "f"},
            {en: "bike", es: "bici", g: "f"}, {en: "lion", es: "león", g: "m"}, {en: "elephant", es: "elefante", g: "m"},
            {en: "monkey", es: "mono", g: "m"}, {en: "cow", es: "vaca", g: "f"}, {en: "pig", es: "cerdo", g: "m"},
            {en: "sun", es: "sol", g: "m"}, {en: "moon", es: "luna", g: "f"}, {en: "star", es: "estrella", g: "f"},
            {en: "computer", es: "computador", g: "m"}, {en: "guitar", es: "guitarra", g: "f"}, {en: "plane", es: "avión", g: "m"},
            {en: "train", es: "tren", g: "m"}, {en: "ship", es: "barco", g: "m"}, {en: "house", es: "casa", g: "f"},
            {en: "school", es: "escuela", g: "f"}, {en: "park", es: "parque", g: "m"}, {en: "beach", es: "playa", g: "f"},
            {en: "mountain", es: "montaña", g: "f"}, {en: "street", es: "calle", g: "f"}, {en: "watch", es: "reloj", g: "m"},
            {en: "wallet", es: "billetera", g: "f"}, {en: "ring", es: "anillo", g: "m"}, {en: "glasses", es: "gafas", g: "f"},
            {en: "mirror", es: "espejo", g: "m"}
        ],
        actions: [
            {en: "I want the", m: "Quiero el", f: "Quiero la"}, {en: "I see the", m: "Veo el", f: "Veo la"},
            {en: "Give me the", m: "Dame el", f: "Dame la"}, {en: "Look at the", m: "Mira el", f: "Mira la"},
            {en: "Where is the", m: "¿Dónde está el", f: "¿Dónde está la"}, {en: "I like the", m: "Me gusta el", f: "Me gusta la"},
            {en: "I need the", m: "Necesito el", f: "Necesito la"}, {en: "Bring me the", m: "Trae el", f: "Trae la"},
            {en: "Open the", m: "Abre el", f: "Abre la"}, {en: "Close the", m: "Cierra el", f: "Cierra la"}
        ],
        // LISTA EXPANDIDA A 20 CONVERSACIONES
        conversations: [
            {q: "¿Cómo te llamas?", r_es: "Mi nombre es Julian", r_en: "My name is Julian", target: "my name is"},
            {q: "¿Cómo estás?", r_es: "Estoy muy bien", r_en: "I am very well", target: "i am"},
            {q: "¿De dónde eres?", r_es: "Soy de Colombia", r_en: "I am from Colombia", target: "i am from"},
            {q: "¿Tienes hambre?", r_es: "Quiero una hamburguesa", r_en: "I want a hamburger", target: "hamburger"},
            {q: "¿Dónde está tu maleta?", r_es: "Mi maleta es azul", r_en: "My suitcase is blue", target: "suitcase"},
            {q: "¿Qué hora es?", r_es: "Son las diez", r_en: "It is ten o'clock", target: "ten"},
            {q: "¿Me ayudas?", r_es: "Claro, con mucho gusto", r_en: "Sure, with pleasure", target: "pleasure"},
            {q: "¿Te gusta el café?", r_es: "Me encanta el café", r_en: "I love coffee", target: "love coffee"},
            {q: "¿Cómo está el clima?", r_es: "Está soleado hoy", r_en: "It is sunny today", target: "sunny"},
            {q: "Mucho gusto", r_es: "Mucho gusto también", r_en: "Nice to meet you too", target: "nice to meet you too"},
            {q: "¿Qué quieres comer?", r_es: "Quiero comer pizza", r_en: "I want to eat pizza", target: "eat pizza"},
            {q: "¿A dónde vas?", r_es: "Voy a mi casa", r_en: "I am going to my house", target: "going to my house"},
            {q: "¿Tienes mascotas?", r_es: "Sí, tengo un perro", r_en: "Yes, I have a dog", target: "have a dog"},
            {q: "¿Cuál es tu color favorito?", r_es: "Mi color favorito es azul", r_en: "My favorite color is blue", target: "color is blue"},
            {q: "¿Cómo te sientes?", r_es: "Me siento muy feliz", r_en: "I feel very happy", target: "feel very happy"},
            {q: "¿Quieres jugar?", r_es: "Sí, quiero jugar contigo", r_en: "Yes, I want to play with you", target: "play with you"},
            {q: "¿Dónde vives?", r_es: "Vivo en una ciudad grande", r_en: "I live in a big city", target: "live in a"},
            {q: "¿Qué estás haciendo?", r_es: "Estoy estudiando inglés", r_en: "I am studying English", target: "studying english"},
            {q: "¿Me puedes dar agua?", r_es: "Aquí tienes el agua", r_en: "Here is the water", target: "here is the water"},
            {q: "¡Adiós, nos vemos!", r_es: "Hasta luego, cuídate", r_en: "See you later, take care", target: "see you later"}
        ]
    };

    function hablar(texto, lang, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(texto);
        msg.lang = lang; msg.rate = 0.85;
        document.getElementById('avatar-box').classList.add('speaking');
        msg.onend = () => { document.getElementById('avatar-box').classList.remove('speaking'); if(callback) callback(); };
        window.speechSynthesis.speak(msg);
    }

    function iniciar(m) {
        state.user = document.getElementById('in-name').value || "Estudiante Caro";
        state.mode = m;
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-app').style.display = 'block';
        document.getElementById('lbl-user').innerText = state.user.toUpperCase();
        hablar(`¡Hola ${state.user}! Empecemos el modo ${m}. Yo te explico en español.`, "es-ES", saltarPaso);
    }

    function saltarPaso() {
        document.getElementById('feedback').innerText = "";
        let en, es, target;

        if (state.mode === 'pro') {
            const conv = db.conversations[Math.floor(Math.random() * db.conversations.length)];
            en = conv.r_en; es = conv.r_es; target = conv.target;
            document.getElementById('main-en').innerText = conv.q.toUpperCase();
            document.getElementById('main-es').innerText = `Responder: ${es}`;
            hablar(`Te pregunto: ${conv.q}. Tú respondes: ${es}. En inglés se dice:`, "es-ES", () => {
                hablar(en, "en-US");
            });
        } else {
            let randomIdx;
            do { randomIdx = Math.floor(Math.random() * db.objects.length); 
            } while (state.history.includes(randomIdx) && state.history.length < 50);
            state.history.push(randomIdx);
            if(state.history.length > 50) state.history.shift();

            const obj = db.objects[randomIdx];
            const act = db.actions[Math.floor(Math.random() * db.actions.length)];
            en = (state.mode === 'junior') ? obj.en : `${act.en} ${obj.en}`;
            es = (state.mode === 'junior') ? obj.es : `${obj.g === 'm' ? act.m : act.f} ${obj.es}`;
            target = en.toLowerCase();
            document.getElementById('main-en').innerText = en.toUpperCase();
            document.getElementById('main-es').innerText = `Pronuncia: ${es}`;

            hablar(`¿Cómo dirías: ${es}? Escucha bien:`, "es-ES", () => {
                hablar(en, "en-US");
            });
        }
        state.actual = { en, es, target };
    }

    function escuchar() {
        const Recognition = window.webkitSpeechRecognition || window.SpeechRecognition;
        const rec = new Recognition(); rec.lang = 'en-US';
        rec.onstart = () => document.getElementById('feedback').innerText = "🎤 Escuchando...";
        rec.onresult = (e) => {
            const voz = e.results[0][0].transcript.toLowerCase();
            if(voz.includes(state.actual.target.toLowerCase())) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                state.points += 100;
                document.getElementById('lbl-points').innerText = state.points;
                document.getElementById('feedback').innerText = "✓ ¡PERFECTO!";
                hablar("¡Excelente pronunciación!", "es-ES", () => setTimeout(saltarPaso, 1500));
            } else {
                document.getElementById('feedback').innerText = `Dijiste: "${voz}"`;
                hablar(`Escuché ${voz}, pero se dice: ${state.actual.en}.`, "es-ES", () => {
                    hablar(state.actual.en, "en-US");
                });
            }
        };
        rec.start();
    }
</script></body></html>
